<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VIC-20 Browser .D64 KULL Turbo Auto Loader</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
    }

    main {
      width: 100%;
      min-height: 100vh;
      padding: 16px;
      display: grid;
      place-items: center;
      gap: 12px;
    }

    #controlsPanel {
      width: min(100%, 980px);
      display: grid;
      justify-items: start;
      gap: 8px;
      color: #f8fafc;
      font-size: 14px;
      line-height: 1.4;
    }

    #instructions {
      white-space: pre-line;
    }

    #startAutomationButton {
      font: inherit;
      cursor: pointer;
      border: 1px solid #3b82f6;
      border-radius: 8px;
      padding: 6px 10px;
      background: #2563eb;
      color: #f8fafc;
      font-weight: 700;
    }

    #startAutomationButton:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    #gameShell {
      width: min(100%, 980px);
      min-height: 520px;
      height: min(75vh, 740px);
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      position: relative;
    }

    #game {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <main>
    <div id="controlsPanel">
      <div id="instructions">INSTRUCTIONS:<br>1. Click inside emulator window<br>2. Wait until you see Vic20 screen<br>2. Click &quot;Start Automation&quot;</div>
      <button id="startAutomationButton" type="button" disabled>Start Automation</button>
    </div>
    <div id="gameShell"></div>
  </main>

      const binary = atob(EMBEDDED_D64_BASE64);
      const bytes = new Uint8Array(binary.length);

      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }

      if (typeof File === "function") {
        return new File([bytes], EMBEDDED_D64_NAME, {
          type: "application/octet-stream",
          lastModified: EMBEDDED_D64_LAST_MODIFIED

      return blob;

      started = true;

      const ram = RAM_EXPANSION;
      setStatus(`Opening VIC-20 emulator with embedded disk: ${selectedFile.name}. Automation will begin after the VIC-20 core starts.`);
      log(`EmulatorJS core: vic20 / VICE xvic. RAM expansion: ${ram}.`);
      log("Input defaults: Direct Keyboard Input = enabled; VICE Keyboard Keymap = symbolic.");
      log("VICE autostart remains disabled; this page types the BASIC commands exactly as keyboard input instead.");
      log(`Turbo disk loading: Automatic Load Warp = ${TURBO_LOAD_AUTOWARP}; Warp Boost = ${TURBO_LOAD_WARP_BOOST}; True Drive Emulation remains enabled.`);
      log(`Graphics default: Shaders = ${DEFAULT_SHADER} (CRT aperture).`);

      gameShell.innerHTML = '<div id="game"></div>';

      // EmulatorJS globals. Keep these global assignments, not const/let, because loader.js reads window.EJS_*.
      window.EJS_player = "#game";
      window.EJS_core = "vic20";
      window.EJS_gameUrl = selectedFile;          // The embedded .d64 is supplied to the emulator as the disk image/content.
      window.EJS_gameName = selectedFile.name;    // Keep the .d64 extension visible to the emulator/core layer.
      window.EJS_gameID = `vic20-kull-auto-embedded-${selectedFile.name}-${selectedFile.size}-${selectedFile.lastModified}`;
      window.EJS_pathtodata = DATA_PATH;

      // Start the emulator immediately when the page is visited.
      window.EJS_startOnLoaded = true;
      window.EJS_startButtonName = "Start VIC-20";

      window.EJS_volume = 0.8;
      window.EJS_color = "#60a5fa";
      window.EJS_DEBUG_XX = true;
      window.EJS_cacheConfig = { enabled: false };
      window.EJS_threads = false;

      window.EJS_defaultOptions = {
        // Graphics Settings > Shaders.
        "shader": DEFAULT_SHADER,

        // EmulatorJS Input Options > Direct Keyboard Input.
        "keyboardInput": "enabled",

        // Backend Core Options > VICE Keyboard Keymap.
        "vice_keyboard_keymap": "symbolic",

        "vice_vic20_model": "VIC20 PAL auto",
        "vice_vic20_memory_expansions": ram,

        // Keep VICE autostart disabled. We do not ask VICE to auto-load or auto-run the disk.
        "vice_autostart": "disabled",

        // Turbo-load normal BASIC disk LOADs by enabling VICE warp while disk I/O is active.
        // "disk_mute" applies warp to disk access only and mutes disk/audio sources that can block warp.
        "vice_autoloadwarp": TURBO_LOAD_AUTOWARP,
        "vice_warp_boost": TURBO_LOAD_WARP_BOOST,
        "vice_drive_sound_emulation": TURBO_LOAD_DRIVE_SOUND,
        "vice_audio_leak_emulation": TURBO_LOAD_AUDIO_LEAK,

        // Required by Libretro VICE for Automatic Load Warp with disk images.
        "vice_drive_true_emulation": "enabled",

        // Leave traps disabled for compatibility with the already-working .d64 workflow.
        "vice_virtual_device_traps": "disabled",
        "vice_statusbar": "bottom_minimal",
        "vice_read_vicerc": "disabled"
      };

      window.EJS_ready = () => {
        log("EmulatorJS ready. Waiting for the VIC-20 core to report that it has started.");
      };

      window.EJS_onGameStart = () => {
        log("VIC-20 core started.");
        coreStarted = true;
        applyLiveKeyboardSettings();
        startAutomationButton.disabled = false;
      };

      const loader = document.createElement("script");
      loader.src = DATA_PATH + "loader.js";
      loader.onerror = () => console.error("Could not load EmulatorJS loader.js from CDN. Check internet access or self-host the data/ folder.");
      document.body.appendChild(loader);
    }

    function applyLiveKeyboardSettings() {
      const gameManager = window.EJS_emulator && window.EJS_emulator.gameManager;
      if (!gameManager) {
        log("Live keyboard settings could not be confirmed yet because the game manager is not available.");
        return;
      }

      if (typeof gameManager.setKeyboardEnabled === "function") {
        gameManager.setKeyboardEnabled(true);
        log("Confirmed live setting: Direct Keyboard Input enabled.");
      }

      if (typeof gameManager.setVariable === "function") {
        gameManager.setVariable("vice_keyboard_keymap", "symbolic");
        log("Confirmed live setting: VICE keyboard keymap symbolic.");

        gameManager.setVariable("shader", DEFAULT_SHADER);
        log("Confirmed live setting: Graphics shader CRT aperture.");

        // Re-assert turbo disk loading after the core starts, before the automated LOAD command is typed.
        gameManager.setVariable("vice_autoloadwarp", TURBO_LOAD_AUTOWARP);
        gameManager.setVariable("vice_warp_boost", TURBO_LOAD_WARP_BOOST);
        gameManager.setVariable("vice_drive_sound_emulation", TURBO_LOAD_DRIVE_SOUND);
        gameManager.setVariable("vice_audio_leak_emulation", TURBO_LOAD_AUDIO_LEAK);
        gameManager.setVariable("vice_drive_true_emulation", "enabled");
        gameManager.setVariable("vice_virtual_device_traps", "disabled");
        log(`Confirmed live setting: VICE Automatic Load Warp ${TURBO_LOAD_AUTOWARP}; Warp Boost ${TURBO_LOAD_WARP_BOOST}.`);
      }
    }

    function queueAutomation(reason, delayMs) {
      if (automationRunning) {
        log("Automation is already running; request ignored.");
        return;
      }

      if (automationTimer) {
        clearTimeout(automationTimer);
        automationTimer = null;
      }

      log(reason);
      setStatus(`Automation queued. Waiting ${Math.round(delayMs / 1000)} seconds before typing the first BASIC line.`);

      automationTimer = setTimeout(() => {
        automationTimer = null;
        runBasicAutomation();
      }, delayMs);
    }

    async function runBasicAutomation() {
      if (automationRunning) return;

      automationRunning = true;
      automationHasRun = true;

      try {
        applyLiveKeyboardSettings();
        focusEmulatorKeyboardTarget();
        setStatus("Typing BASIC automation now. Please do not click away until it finishes.");

        for (const step of BASIC_AUTOMATION_STEPS) {
          log(`${step.description}: ${step.line}`);
          await typeLineIntoEmulator(step.line);
          await pressEnterInEmulator();

          if (step.waitAfterEnter > 0) {
            setStatus(`Entered: ${step.line}. Waiting ${Math.round(step.waitAfterEnter / 1000)} seconds before the next line.`);
            await wait(step.waitAfterEnter);
          }
        }

        setStatus("Automation complete. The final RUN command has been entered.");
      } catch (error) {
        console.error(error && error.message ? error.message : error);
        if (coreStarted && startAutomationButton) {
          startAutomationButton.disabled = false;
          automationHasRun = false;
        }
      } finally {
        automationRunning = false;
      }
    }

    function getKeyboardTarget() {
      return document.querySelector("#game canvas") ||
             document.querySelector("canvas") ||
             document.getElementById("game") ||
             gameShell ||
             document.body;
    }

    function focusEmulatorKeyboardTarget() {
      const target = getKeyboardTarget();

      if (target && target instanceof HTMLElement) {
        if (!target.hasAttribute("tabindex")) {
          target.setAttribute("tabindex", "0");
        }
        target.focus({ preventScroll: true });
      }

      if (window.EJS_emulator && typeof window.EJS_emulator.displayMessage === "function") {
        window.EJS_emulator.displayMessage("Typing KULL BASIC automation...");
      }
    }

    async function typeLineIntoEmulator(line) {
      for (const char of line) {
        focusEmulatorKeyboardTarget();
        await pressCharacterInEmulator(char);
        await wait(BETWEEN_KEYS_MS);
      }
    }

    async function pressEnterInEmulator() {
      focusEmulatorKeyboardTarget();
      await pressKeyInEmulator({
        key: "Enter",
        code: "Enter",
        keyCode: 13,
        shiftKey: false,
        printable: false
      });
    }

    async function pressCharacterInEmulator(char) {
      const keyInfo = keyInfoForCharacter(char);
      await pressKeyInEmulator(keyInfo);
    }

    async function pressKeyInEmulator(keyInfo) {
      const target = getKeyboardTarget();
      if (!target) {
        throw new Error("Could not find an emulator keyboard target.");
      }

      // Do not only mark the printable key as shifted. VICE receives the
      // browser key events as a keyboard matrix, so Shift must be pressed
      // before the shifted key and released afterwards. Without this, : is
      // read as ; and " is read as '.
      if (keyInfo.shiftKey) {
        dispatchKeyboardEvent(target, "keydown", SHIFT_LEFT_KEY);
        await wait(MODIFIER_SETTLE_MS);
        dispatchKeyboardEvent(target, "keydown", keyInfo);
        await wait(KEY_HOLD_MS);
        dispatchKeyboardEvent(target, "keyup", keyInfo);
        await wait(MODIFIER_SETTLE_MS);
        dispatchKeyboardEvent(target, "keyup", { ...SHIFT_LEFT_KEY, shiftKey: false });
        return;
      }

      dispatchKeyboardEvent(target, "keydown", keyInfo);
      await wait(KEY_HOLD_MS);
      dispatchKeyboardEvent(target, "keyup", keyInfo);
    }

    function dispatchKeyboardEvent(target, type, keyInfo) {
      const event = new KeyboardEvent(type, {
        key: keyInfo.key,
        code: keyInfo.code,
        keyCode: keyInfo.keyCode,
        which: keyInfo.keyCode,
        charCode: type === "keypress" && keyInfo.printable ? keyInfo.key.charCodeAt(0) : 0,
        shiftKey: keyInfo.shiftKey,
        ctrlKey: false,
        altKey: false,
        metaKey: false,
        repeat: false,
        bubbles: true,
        cancelable: true,
        composed: true
      });

      // Some browser builds expose keyCode/which/charCode as read-only values.
      // Defining getters makes the synthetic event look like a normal physical key event to older listeners.
      defineEventNumber(event, "keyCode", keyInfo.keyCode);
      defineEventNumber(event, "which", keyInfo.keyCode);
      defineEventNumber(event, "charCode", type === "keypress" && keyInfo.printable ? keyInfo.key.charCodeAt(0) : 0);

      target.dispatchEvent(event);
    }

    function defineEventNumber(event, property, value) {
      try {
        Object.defineProperty(event, property, {
          get: () => value
        });
      } catch (error) {
        // Ignore browsers that do not allow redefining these legacy properties.
      }
    }

    function keyInfoForCharacter(char) {
      if (/^[a-z]$/.test(char)) {
        return {
          key: char,
          code: `Key${char.toUpperCase()}`,
          keyCode: char.toUpperCase().charCodeAt(0),
          shiftKey: false,
          printable: true
        };
      }

      if (/^[A-Z]$/.test(char)) {
        return {
          key: char,
          code: `Key${char}`,
          keyCode: char.charCodeAt(0),
          shiftKey: true,
          printable: true
        };
      }

      if (/^[0-9]$/.test(char)) {
        return {
          key: char,
          code: `Digit${char}`,
          keyCode: char.charCodeAt(0),
          shiftKey: false,
          printable: true
        };
      }

      const punctuation = {
        " ": { key: " ", code: "Space", keyCode: 32, shiftKey: false },
        ",": { key: ",", code: "Comma", keyCode: 188, shiftKey: false },
        ":": { key: ":", code: "Semicolon", keyCode: 186, shiftKey: true },
        "\"": { key: "\"", code: "Quote", keyCode: 222, shiftKey: true },
        "(": { key: "(", code: "Digit9", keyCode: 57, shiftKey: true },
        ")": { key: ")", code: "Digit0", keyCode: 48, shiftKey: true }
      };

      if (punctuation[char]) {
        return {
          ...punctuation[char],
          printable: true
        };
      }

      throw new Error(`Unsupported automation character: ${char}`);
    }
  </script>
</body>
</html>
